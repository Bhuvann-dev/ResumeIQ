# One-click-ish deploy to Render (https://render.com).
# In the Render dashboard: New + > Blueprint > point at this repo.
# Then set OPENAI_API_KEY, OPENAI_MODEL, and CORS_ORIGINS in the Environment tab.
services:
  - type: web
    name: resumeiq-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: CORS_ORIGINS
        sync: false
